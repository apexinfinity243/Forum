<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forum</title>
  <style>
    body {
      margin:0;
      opacity: 0; /* fade in */
      transition: opacity 0.5s;
    }
    img {
      width: 100%;
      height: 100vh;
      object-fit: cover;
    }
    h2 {
      position: absolute;
      top: 20px;
      width: 100%;
      text-align: center;
      color: white;
      font-size: 24px;
      text-shadow: 1px 1px 5px black;
    }
  </style>
</head>
<body>
<h2 id="welcome"></h2>
<img src="image/IMG-20260330-WA0005.jpg" alt="Forum Image">
<script>
  // Fade in de la page
  window.onload = function() {
    document.body.style.opacity = 1;

    // Récupérer le nom et afficher
    let nom = localStorage.getItem("username");
    if(nom) {
      document.getElementById("welcome").innerText = "Bienvenue " + nom;
    }
  }
</script>
</body>
</html>
